<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awkward Socials - Chat</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="chat-room">
        <header class="chat-header">
            <div>
                <h1>Awkward Socials</h1>
                <p>Retro Lobby // Global Channel</p>
            </div>
            <button id="logoutBtn" class="logout-btn" type="button">Logout</button>
        </header>

        <section class="panel post-panel">
            <h2>Drop A Message</h2>
            <textarea id="postContent" placeholder="What's happening?"></textarea>
            <button id="postBtn" class="post-btn" type="button">Post</button>
        </section>

        <section class="panel feed-panel">
            <h2>Live Feed</h2>
            <div id="feed" aria-live="polite"></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="app.js"></script>
</body>

</html>
