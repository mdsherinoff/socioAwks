<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awkward Socials - Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="auth-screen">
        <section class="auth-card">
            <header class="chat-header auth-header">
                <h1>Awkward Socials</h1>
                <p>Login Terminal // Please Authenticate</p>
            </header>

            <section id="auth" class="panel auth-panel">
                <h2>Sign In / Sign Up</h2>
                <div class="auth-grid">
                    <input id="email" type="email" placeholder="Email" autocomplete="email" required>
                    <input id="password" type="password" placeholder="Password" autocomplete="current-password"
                        required>
                    <input id="username" placeholder="Username" autocomplete="username">
                </div>
                <div class="auth-actions">
                    <button id="signupBtn" type="button">Sign Up</button>
                    <button id="loginBtn" type="button">Login</button>
                </div>
            </section>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="app.js"></script>
</body>

</html>
