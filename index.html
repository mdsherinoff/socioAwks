<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awkward Socials</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main id="authView" class="auth-screen">
        <section class="auth-card">
            <header class="chat-header auth-header">
                <h1>Awkward Socials</h1>
                <p>Login Terminal // Please Authenticate</p>
            </header>

            <section id="auth" class="panel auth-panel">
                <h2>Sign In / Sign Up</h2>
                <div class="auth-grid">
                    <input id="email" placeholder="Email">
                    <input id="password" type="password" placeholder="Password">
                    <input id="username" placeholder="Username (for sign up)">
                </div>
                <div class="auth-actions">
                    <button onclick="signup()">Sign Up</button>
                    <button onclick="login()">Login</button>
                </div>
            </section>
        </section>
    </main>

    <main id="chatView" class="chat-room hidden">
        <header class="chat-header">
            <div>
                <h1>Awkward Socials</h1>
                <p>Retro Lobby // Global Channel</p>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </header>

        <section class="panel post-panel">
            <h2>Drop A Message</h2>
            <textarea id="postContent" placeholder="What's happening?"></textarea>
            <button class="post-btn" onclick="createPost()">Post</button>
        </section>

        <section class="panel feed-panel">
            <h2>Live Feed</h2>
            <div id="feed"></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="app.js"></script>
</body>

</html>
